# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── H2 in-memory (dev – zero setup) ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:placementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (production) – uncomment & fill in ──────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/placement_db?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.placement=DEBUG
